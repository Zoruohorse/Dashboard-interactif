<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographie Interactive — Interconnexion France-Espagne</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            --color-opposed: #ef4444;
            --color-opposed-light: #fee2e2;
            --color-favorable: #22c55e;
            --color-favorable-light: #dcfce7;
            --color-neutral: #f59e0b;
            --color-neutral-light: #fef3c7;
            
            --primary: #3b82f6;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Menu Onglets */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: var(--radius);
            transition: var(--transition);
        }

        .tab-btn:hover {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.2s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Interface Cartographie */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 968px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Filtres */
        .filters-sidebar {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            position: sticky;
            top: 2rem;
        }

        .filter-section {
            margin-bottom: 1.5rem;
        }

        .filter-section h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.6rem 0.8rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn .count {
            font-size: 0.75rem;
            background-color: rgba(0, 0, 0, 0.05);
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
        }

        .filter-btn.active .count {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Grille des Cartes Acteurs */
        .actors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .actor-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .actor-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .actor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
        }

        .actor-card.opposed::before { background-color: var(--color-opposed); }
        .actor-card.favorable::before { background-color: var(--color-favorable); }
        .actor-card.neutral::before { background-color: var(--color-neutral); }

        .actor-header {
            margin-bottom: 1rem;
        }

        .actor-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .actor-role {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .actor-body {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .actor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            font-size: 0.8rem;
        }

        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.025em;
        }

        .badge.opposed { background-color: var(--color-opposed-light); color: var(--color-opposed); }
        .badge.favorable { background-color: var(--color-favorable-light); color: var(--color-favorable); }
        .badge.neutral { background-color: var(--color-neutral-light); color: var(--color-neutral); }

        .certitude {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Modal Détails Acteur */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            position: relative;
            animation: modalAnim 0.2s ease-out;
        }

        @keyframes modalAnim {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-field {
            margin-bottom: 1.25rem;
        }

        .modal-field label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .modal-field p {
            font-size: 1rem;
            color: var(--text-main);
        }

        .modal-verbatim {
            background-color: var(--bg-primary);
            padding: 1rem;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            font-style: italic;
        }

        /* Styles Onglet Griefs */
        .griefs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 2rem;
        }

        @media (max-width: 640px) {
            .griefs-container { grid-template-columns: 1fr; }
        }

        .grief-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .grief-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Listes & Sources */
        .list-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .list-card h2 {
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .list-card ul {
            padding-left: 1.5rem;
        }

        .list-card li {
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>

        <h1 id="header-title">Chargement...</h1>
        <p id="header-subtitle"></p>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('carto', this)">Cartographie des Acteurs</button>
        <button class="tab-btn" onclick="switchTab('griefs', this)">Synthèse des Griefs</button>
        <button class="tab-btn" onclick="switchTab('vigilance', this)">Points de Vigilance &amp; Sources</button>
    </nav>

        <div class="dashboard-layout">
            <aside class="filters-sidebar">
                <div class="filter-section">

                    <div class="filter-options" id="cat-filters-container"></div>

                <div class="filter-section">
                    <h3>Positionnement</h3>
                    <div class="filter-options" id="stance-filters-container"></div>
                </div>
            </aside>

            <main class="actors-grid" id="actors-grid"></main>
        </div>
    </div>

    <div id="tab-griefs" class="tab-content">
        <div class="griefs-container" id="griefs-grid"></div>
    </div>
