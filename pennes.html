<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographie interactive — Data Center Cézanne</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            --color-opposed: #ef4444;
            --color-opposed-light: #fee2e2;
            --color-favorable: #22c55e;
            --color-favorable-light: #dcfce7;
            --color-neutral: #f59e0b;
            --color-neutral-light: #fef3c7;
            
            --primary: #3b82f6;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Menu Onglets */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: var(--radius);
            transition: var(--transition);
        }

        .tab-btn:hover {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.2s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Interface Cartographie */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 968px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Filtres */
        .filters-sidebar {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            position: sticky;
            top: 2rem;
        }

        .filter-section {
            margin-bottom: 1.5rem;
        }

        .filter-section h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.6rem 0.8rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn .count {
            font-size: 0.75rem;
            background-color: rgba(0, 0, 0, 0.05);
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
        }

        .filter-btn.active .count {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Grille des Cartes Acteurs */
        .actors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .actor-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .actor-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .actor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
        }

        .actor-card.opposed::before { background-color: var(--color-opposed); }
        .actor-card.favorable::before { background-color: var(--color-favorable); }
        .actor-card.neutral::before { background-color: var(--color-neutral); }

        .actor-header {
            margin-bottom: 1rem;
        }

        .actor-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .actor-role {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .actor-body {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .actor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            font-size: 0.8rem;
        }

        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.025em;
        }

        .badge.opposed { background-color: var(--color-opposed-light); color: var(--color-opposed); }
        .badge.favorable { background-color: var(--color-favorable-light); color: var(--color-favorable); }
        .badge.neutral { background-color: var(--color-neutral-light); color: var(--color-neutral); }

        .certitude {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Modal Détails Acteur */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            position: relative;
            animation: modalAnim 0.2s ease-out;
        }

        @keyframes modalAnim {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-field {
            margin-bottom: 1.25rem;
        }

        .modal-field label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .modal-field p {
            font-size: 1rem;
            color: var(--text-main);
        }

        .modal-verbatim {
            background-color: var(--bg-primary);
            padding: 1rem;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            font-style: italic;
        }

        /* Styles Onglet Griefs */
        .griefs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 2rem;
        }

        @media (max-width: 640px) {
            .griefs-container { grid-template-columns: 1fr; }
        }

        .grief-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .grief-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Listes & Sources */
        .list-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .list-card h2 {
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .list-card ul {
            padding-left: 1.5rem;
        }

        .list-card li {
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Chargement...</h1>
        <p id="header-subtitle"></p>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('carto', this)">Cartographie des acteurs</button>
        <button class="tab-btn" onclick="switchTab('griefs', this)">Synthèse des oppositions</button>
        <button class="tab-btn" onclick="switchTab('vigilance', this)">Points de vigilance &amp; sources</button>
    </nav>

    <div id="tab-carto" class="tab-content active">
        <div class="dashboard-layout">
            <aside class="filters-sidebar">
                <div class="filter-section">
                    <h3>Collèges d'acteurs</h3>
                    <div class="filter-options" id="cat-filters-container"></div>
                </div>

                <div class="filter-section">
                    <h3>Positionnement</h3>
                    <div class="filter-options" id="stance-filters-container"></div>
                </div>
            </aside>

            <main class="actors-grid" id="actors-grid"></main>
        </div>
    </div>

    <div id="tab-griefs" class="tab-content">
        <div class="griefs-container" id="griefs-grid"></div>
    </div>

    <div id="tab-vigilance" class="tab-content">
        <div class="list-card">
            <h2>🔍 Points de vigilance majeurs (Limites et incertitudes)</h2>
            <ul id="vigilance-list"></ul>
        </div>

        <div class="list-card">
            <h2>📰 Médias et sources d'investigation répertoriés</h2>
            <ul id="sources-list"></ul>
        </div>
    </div>

    <div class="modal" id="actor-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="toggleModal(false)">×</button>
            <div class="modal-field">
                <label>Nom / Entité</label>
                <h2 id="modal-name" style="font-size:1.6rem; font-weight:700;"></h2>
            </div>
            <div class="modal-field">
                <label>Fonction / Rattachement</label>
                <p id="modal-role"></p>
            </div>
            <div class="modal-field">
                <label>Positionnement ou Argument Principal</label>
                <p id="modal-position"></p>
            </div>
            <div class="modal-field">
                <label>Verbatim / Preuve documentaire</label>
                <p id="modal-verbatim" class="modal-verbatim"></p>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <div class="modal-field" style="margin:0;">
                    <label>Orientation</label>
                    <span id="modal-stance-badge" class="badge"></span>
                </div>
                <div class="modal-field" style="margin:0; text-align: right;">
                    <label>Niveau de certitude</label>
                    <p id="modal-certainty" class="certitude"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Base de données intégrée unifiée - Data center Cézanne
        const projectData = {
            meta: {
                title: "Cartographie Interactive — Data center Cézanne — Sybilles",
                subtitle: "Projet de data center porté par Telehouse (KDDI) aux Pennes-Mirabeau, cristallisant une forte opposition citoyenne et politique (recours judiciaires) face aux risques de nuisances, d'incendie et de saturation des réseaux."
            },
            taxonomy: {
                categories: {
                    "all": "Tous les acteurs",
                    "opposants": "Opposants & Experts",
                    "elus-opp": "Élus Opposés/Critiques",
                    "elus-fav": "Élus Favorables/Prudents",
                    "orgs": "Orgs & Collectifs",
                    "porteurs": "Porteurs & Économie"
                },
                stances: {
                    "all": "Toutes les positions",
                    "opposed": "Opposé / Critique",
                    "favorable": "Favorable / Soutien",
                    "neutral": "Prudent / Ambigü"
                }
            },
            actors: [
                { name: "Collectif Non au data center", category: "orgs", stance: "opposed", role: "Collectif d’habitants opposé au projet Telehouse", position: "Maintient le recours juridique en cours et exige publiquement davantage de garanties environnementales.", evidence: "Dépôt d'un recours collectif contre le permis de construire.", certainty: "Haute" },
                { name: "CIQ des Pallières", category: "orgs", stance: "opposed", role: "Comité d’intérêt de quartier des Pennes-Mirabeau", position: "Partie prenante active du recours collectif contre le permis de construire du site.", evidence: "Co-requérant juridique du recours.", certainty: "Haute" },
                { name: "CIQ Sybilles-Amphoux", category: "orgs", stance: "opposed", role: "Comité d’intérêt de quartier de Saint-Victoret", position: "Mobilisé contre les nuisances immédiates, le traitement de la chaleur fatale et l'absence de garanties de sécurité.", evidence: "Inquiétude formalisée sur le risque incendie et les nuisances.", certainty: "Haute" },
                { name: "Habitants pennois et saint-victoriens", category: "opposants", stance: "opposed", role: "Riverains mobilisés dans le recours collectif", position: "Contestent fermement l’absence de concertation préalable, les risques environnementaux et les futures nuisances.", evidence: "Adhésion massive au recours collectif local.", certainty: "Haute" },
                { name: "Associations environnementales", category: "orgs", stance: "opposed", role: "Parties prenantes du recours collectif", position: "Soutiennent juridiquement l'opposition locale bien que leurs noms ne soient pas tous détaillés.", evidence: "Mentions de soutien associatif au recours.", certainty: "Moyenne" },
                { name: "Martine Mezzo", category: "opposants", stance: "opposed", role: "Représentante du collectif « Non au data center »", position: "Affirme avec fermeté que le collectif ne retirera sous aucun prétexte son recours administratif.", evidence: "Déclaration de maintien du recours.", certainty: "Haute" },
                { name: "Christine Muscat", category: "opposants", stance: "opposed", role: "Présidente du CIQ des Pallières", position: "Maintient le recours pour être formellement entendue, obtenir des réponses et contester le projet tel qu'il est présenté.", evidence: "Demande de réponses claires via le maintien du recours.", certainty: "Haute" },
                { name: "Christel Fayette", category: "opposants", stance: "opposed", role: "Présidente du CIQ Sybilles-Amphoux", position: "Alerte de manière répétée sur les excavations, la gestion de la chaleur fatale et les risques sanitaires afférents.", evidence: "Alerte documentée sur les travaux d'excavation.", certainty: "Haute" },
                { name: "Hervé Plisson", category: "opposants", stance: "opposed", role: "Habitant de Bouc-Bel-Air", position: "Critique la rapidité expéditive des projets, le déséquilibre du rapport de force et l’appui aveugle de l'État.", evidence: "Dénonce le déséquilibre flagrant du rapport de force.", certainty: "Haute" },
                { name: "Patrick Robert", category: "opposants", stance: "opposed", role: "Vice-président de la fédération des CIQ du 16e arrondissement", position: "Alerte vigoureusement sur l’empressement des procédures administratives et les futurs conflits d’usage électriques.", evidence: "Met en garde contre les conflits d'usage sur le réseau électrique.", certainty: "Haute" },
                { name: "Arthur", category: "opposants", stance: "opposed", role: "Militant engagé contre le projet de Gardanne", position: "Critique la vision et le modèle de société portés par la prolifération des data centers et de leurs usages.", evidence: "Opposition culturelle et sociétale au modèle numérique.", certainty: "Haute" },
                { name: "Antoine Devillet", category: "opposants", stance: "opposed", role: "Membre du collectif Le Nuage était sous nos pieds", position: "Insiste sur la nécessité d'enquêtes publiques, d'un moratoire et de l'organisation d'une convention citoyenne.", evidence: "Plaidoyer en faveur d'un moratoire et d'une convention citoyenne.", certainty: "Haute" },
                { name: "Laure", category: "opposants", stance: "opposed", role: "Citoyenne rencontrée lors d’une balade", position: "Exprime un intérêt naissant pour l’engagement critique face à ce type d'infrastructures.", evidence: "Témoignage de terrain lors d'une action de sensibilisation.", certainty: "Moyenne" },
                { name: "Jean-Claude", category: "opposants", stance: "opposed", role: "Habitant cité aux Pennes-Mirabeau", position: "Doute profondément des bénéfices réels du projet et alerte sur les consommations d’électricité et d’eau.", evidence: "Doutes exprimés sur les bilans hydriques et électriques.", certainty: "Haute" },
                { name: "Vanessa", category: "opposants", stance: "opposed", role: "Habitante citée", position: "S’inquiète de la bétonisation, de la perte de l’esprit village et de la formation d'un îlot de chaleur.", evidence: "Craintes exprimées sur la création d'îlots de chaleur.", certainty: "Haute" },
                { name: "Romain Amaro", category: "elus-opp", stance: "opposed", role: "Maire DVD des Pennes-Mirabeau", position: "S’est dit farouchement contre le projet en l’état, mais se heurte au risque juridique et financier d’un retrait du permis.", evidence: "Opposition officielle tempérée par le risque de contentieux financier.", certainty: "Haute" },

                { name: "Michel Amiel", category: "elus-fav", stance: "neutral", role: "Ancien maire des Pennes-Mirabeau", position: "A signé le permis de construire avant les élections, ce qui cristallise désormais une grande partie des critiques locales.", evidence: "Signataire originel du permis de construire litigieux.", certainty: "Haute" },
                { name: "Grégory Bouchet", category: "elus-fav", stance: "favorable", role: "Candidat SE / majorité sortante", position: "Seul candidat explicitement favorable dans le débat municipal, justifiant sa position par l'emploi et les recettes fiscales.", evidence: "Soutien électoral explicite basé sur les retombées financières.", certainty: "Haute" },
                { name: "Jean-Philippe Musso", category: "elus-fav", stance: "neutral", role: "Candidat DVG", position: "Plutôt favorable sur le principe à l'accueil d'un data center, mais estime que le secteur choisi est inadéquat.", evidence: "Positionnement favorable soumis à condition de relocalisation.", certainty: "Moyenne" },
                { name: "Laurent Simon", category: "elus-fav", stance: "neutral", role: "Président de la SPL Énergies de Provence", position: "Se montre intéressé par les perspectives du réseau de chaleur fatale, tout en jugeant qu’il est prématuré de conclure.", evidence: "Intérêt technique affiché couplé à une réserve de calendrier.", certainty: "Moyenne" },
                { name: "Jean-Charles Lamathe", category: "elus-fav", stance: "neutral", role: "Quatrième adjoint aux Pennes-Mirabeau", position: "Cité sur le débat budgétaire général, sans qu'une position centrale sur le data center ne soit détaillée.", evidence: "Intervention périphérique sur les aspects budgétaires.", certainty: "Faible" },
                { name: "Sandrine Gras-Trubert", category: "elus-fav", stance: "neutral", role: "Conseillère municipale d’opposition", position: "Intervient sur les délégations sécurité et transition écologique, sans opposition détaillée directement liée au projet.", evidence: "Implication politique sans posture explicite sur le dossier.", certainty: "Faible" },
                { name: "Telehouse", category: "porteurs", stance: "favorable", role: "Porteur du projet Cézanne aux Sybilles", position: "Déploie un complexe de huit bâtiments prévus sur environ six hectares, assumant le développement local.", evidence: "Maître d'ouvrage et opérateur du site projeté.", certainty: "Haute" },
                { name: "KDDI", category: "porteurs", stance: "favorable", role: "Groupe japonais propriétaire de Telehouse", position: "蔭 de l'acteur industriel et financier indirect, cautionnant la viabilité du projet.", evidence: "Structure actionnariale mère de l'opérateur local.", certainty: "Haute" },
                { name: "RTE", category: "porteurs", stance: "neutral", role: "Gestionnaire du réseau", position: "Intervient sur le raccordement électrique ; mention d’un enfouissement total des lignes selon les échanges.", evidence: "Responsable technique de l'alimentation HT/THT.", certainty: "Haute" },
                { name: "ARS", category: "orgs", stance: "neutral", role: "Agence régionale de santé", position: "Citée par les riverains pour évaluer les risques sanitaires cumulés dans un territoire déjà très pollué.", evidence: "Ciblée comme autorité de contrôle sanitaire par les requérants.", certainty: "Haute" },
                { name: "SDIS", category: "orgs", stance: "neutral", role: "Service départemental d'incendie", position: "A émis un avis favorable sur le dossier malgré les fortes inquiétudes riveraines sur le risque incendie.", evidence: "Avis consultatif officiel favorable au permis.", certainty: "Haute" },
                { name: "SPL Énergies de Provence", category: "porteurs", stance: "neutral", role: "Société publique locale", position: "Sollicitée officiellement pour modéliser et réfléchir à un réseau de récupération de chaleur fatale.", evidence: "Intégrée à la réflexion de compensation énergétique.", certainty: "Haute" },
                { name: "SPLA Pays d’Aix Territoires", category: "porteurs", stance: "neutral", role: "Structure d'aménagement", position: "Impliquée dans la cession initiale du terrain avant sa revente à l'opérateur Telehouse.", evidence: "Acteur de la transaction foncière d'origine.", certainty: "Haute" },
                { name: "Préfecture / État", category: "orgs", stance: "neutral", role: "Cadre administratif et décisionnel", position: "Cité face au risque que le représentant de l'État ne ferme unilatéralement la possibilité de négociation locale.", evidence: "Autorité de dernier recours sur les autorisations d'urbanisme.", certainty: "Haute" },
                { name: "Tribunal administratif de Marseille", category: "orgs", stance: "neutral", role: "Instance de justice", position: "Saisie par le recours de la mairie de Saint-Victoret et par le recours collectif des CIQ et habitants.", evidence: "Juridiction officiellement saisie des recours d'annulation.", certainty: "Haute" },
                { name: "Le Nuage était sous nos pieds", category: "orgs", stance: "opposed", role: "Collectif marseillais critique des data centers", position: "Mène des enquêtes, formations, balades urbaines et porte une bataille culturelle pour exiger un moratoire.", evidence: "Organisation de la contestation et demande formelle de moratoire.", certainty: "Haute" },
                { name: "Data for Good", category: "orgs", stance: "opposed", role: "Collectif d'experts", position: "Vient en support des oppositions locales, notamment pour disséquer les études d'impact et les failles juridiques.", evidence: "Apport d'une expertise critique de contre-pouvoir.", certainty: "Haute" },
                { name: "France Nature Environnement", category: "orgs", stance: "opposed", role: "Réseau associatif national", position: "Cité comme appui essentiel aux collectifs locaux pour chercher des failles juridiques dans les permis et documents d’urbanisme.", evidence: "Soutien juridique structurel aux requérants locaux.", certainty: "Haute" },
                { name: "Collectifs de Gardanne", category: "orgs", stance: "opposed", role: "Mouvement de contestation locale", position: "Mobilisés sur les enjeux de la reconversion industrielle d’une écoplateforme soupçonnée d'accueillir un data center.", evidence: "Foyer de contestation parallèle en lien avec le réseau global.", certainty: "Haute" },
                { name: "Collectifs de Bouc-Bel-Air", category: "orgs", stance: "opposed", role: "Mouvement de contestation locale", position: "Mobilisés autour du projet Digital Realty MRS6, avec de fortes inquiétudes sur l’environnement et les nuisances sonores.", evidence: "Autre front de mobilisation environnementale régionale.", certainty: "Haute" },
                { name: "Collectifs Marseille nord / Estaque", category: "orgs", stance: "opposed", role: "Mouvement de contestation locale", position: "Mobilisations liées aux très nombreux projets de data centers du 16e arrondissement et à l'accaparement électrique.", evidence: "Mobilisation dénonçant la densification des infrastructures.", certainty: "Haute" },
                { name: "Philippe Chabeaudy", category: "opposants", stance: "opposed", role: "Habitant des Pennes-Mirabeau", position: "Redoute publiquement le risque d'incendie inhérent à l'implantation du data center Cézanne.", evidence: "Prise de position ciblée sur le risque d'incendie.", certainty: "Haute" },
                { name: "Lou Welgryn", category: "opposants", stance: "opposed", role: "Coprésidente de Data for Good", position: "Critique le gigantisme aveugle des installations se déployant sans aucune stratégie démocratique globale.", evidence: "Dénonciation de l'absence de planification stratégique.", certainty: "Haute" },
                { name: "Cécile Diguet", category: "opposants", stance: "opposed", role: "Urbaniste", position: "Pointe la totale incompatibilité des projets massifs avec les stratégies environnementales et climatiques locales.", evidence: "Analyse technique démontrant l'incompatibilité avec les plans climats.", certainty: "Haute" },
                { name: "Maxime Colin", category: "opposants", stance: "opposed", role: "Juriste à France Nature Environnement", position: "Dénonce l'émergence d'une législation de plus en plus permissive faite sur-mesure pour les opérateurs.", evidence: "Dénonciation des reculs de la réglementation d'urbanisme.", certainty: "Haute" },
                { name: "Maxime Efoui-Hess", category: "opposants", stance: "opposed", role: "Membre du Shift Project", position: "Alerte de manière documentée sur les futurs conflits d'usage électrique entre les industries et les citoyens.", evidence: "Analyse de prospective sur la saturation des réseaux électriques.", certainty: "Haute" },
                { name: "Shift Project", category: "orgs", stance: "opposed", role: "Think tank de la transition carbone", position: "Souligne les lourds risques systémiques liés à la priorisation énergétique accordée aux data centers.", evidence: "Expertise macro-économique versée au débat critique.", certainty: "Haute" },
                { name: "Associations de Wissous", category: "orgs", stance: "opposed", role: "Collectifs citoyens", position: "Mènent une action en justice exemplaire contre les stratégies de saucissonnage des projets d'infrastructure.", evidence: "Jurisprudence militante citée comme modèle par les opposants.", certainty: "Haute" },
                { name: "France Datacenter", category: "orgs", stance: "favorable", role: "Association professionnelle", position: "Représente la filière des data centers et promeut leur développement inconditionnel sur le territoire.", evidence: "Lobbying actif pour faciliter les implantations industrielles.", certainty: "Haute" },
                { name: "Michaël Reffay", category: "porteurs", stance: "favorable", role: "Délégué général de France Datacenter", position: "Défend avec ferveur l'utilité économique indiscutable de ces projets pour la souveraineté française.", evidence: "Argumentaire axé sur la souveraineté économique nationale.", certainty: "Haute" },
                { name: "Ademe", category: "orgs", stance: "neutral", role: "Agence environnementale de l'État", position: "Prévoit dans ses études de prospective un quadruplement de la consommation électrique de ces infrastructures.", evidence: "Modélisation publique des hausses de consommation à venir.", certainty: "Haute" },
                { name: "Gouvernement français", category: "orgs", stance: "favorable", role: "Exécutif de l'État", position: "Soutient activement les investissements massifs dans les giga data centers pour des raisons de compétitivité.", evidence: "Soutien politique assumé au niveau national.", certainty: "Haute" },
                { name: "EDF", category: "porteurs", stance: "favorable", role: "Producteur d'énergie", position: "Énergéticien qui a un besoin stratégique du marché des data centers comme nouveau relais de croissance massif.", evidence: "Filiation d'intérêts commerciaux pointée par la filière.", certainty: "Haute" }
            ],
            griefs: [
                { title: "🔥 Risque incendie", text: "Crainte forte des riverains des CIQ et du maire de Saint-Victoret face au dégagement thermique en bordure d'espaces habités et naturels, malgré l'avis favorable du SDIS." },
                { title: "💧 Surconsommation d'eau", text: "Interrogations répétées des riverains (comme Jean-Claude) et des élus sur le volume des rejets d'eau et l'impact hydrique d'une telle infrastructure." },
                { title: "⚡ Conflits d'usage électrique", text: "Alerte experte (Shift Project) et citoyenne (CIQ 16e) sur l'accaparement de la capacité électrique locale par un seul acteur au détriment d'autres besoins (électrification des quais, etc.)." },
                { title: "🌡️ Chaleur fatale et îlot de chaleur", text: "Inquiétude des CIQ (Sybilles-Amphoux) et des riverains concernant la formation potentielle d'un micro-climat local (îlot de chaleur) impactant la qualité de vie." },
                { title: "⚖️ Déni de démocratie locale", text: "Colère des riverains et des CIQ dénonçant un projet imposé dans l'urgence, sans aucune concertation préalable ni transparence sur le permis de construire (signé par l'ancienne municipalité)." },
                { title: "📑 Saucissonnage administratif", text: "Crainte (étayée par les réseaux d'experts FNE / Data for Good) d'une stratégie de fractionnement du projet global pour minorer artificiellement les études d'impact." }
            ],
            vigilance: [
                "<strong>Conflit institutionnel et impasse juridique :</strong> Le maire actuel des Pennes-Mirabeau s'oppose au projet mais se déclare pieds et poings liés face au risque financier (retrait du permis signé par son prédécesseur), forçant les CIQ à porter seuls la charge du recours en annulation.",
                "<strong>Bataille sur le risque technologique :</strong> Un décalage majeur existe entre l'approbation réglementaire du SDIS (sécurité incendie) et la forte angoisse citoyenne justifiée par les antécédents d'incendies sur ce type de sites.",
                "<strong>Saturation métropolitaine :</strong> Le projet s'inscrit dans un contexte marseillais (Gardanne, Bouc-Bel-Air, 16e arrondissement) déjà saturé de tensions autour des méga-infrastructures, facilitant la convergence des luttes locales avec des réseaux experts nationaux (Le Nuage était sous nos pieds, Data for Good)."
            ],
            sources: [
                "<strong>La Provence :</strong> Média local ayant suivi le dossier électoral, les recours, les positions d’élus et les tensions autour de Telehouse.",
                "<strong>Marsactu :</strong> Média local d’investigation ; cité sur les fuites de gaz fluorés et le recours fragilisant les plans du maire.",
                "<strong>L’ADN :</strong> Média ayant publié le reportage sur Marseille, hub mondial et luttes locales.",
                "<strong>France 3 PACA :</strong> Média ayant couvert la résistance d’élus et de riverains aux Pennes-Mirabeau / Saint-Victoret.",
                "<strong>Mucem :</strong> Institution culturelle ayant abandonné son partenariat avec Digital Realty sous pression du Nuage était sous nos pieds.",
                "<strong>Grand Port Maritime de Marseille :</strong> Acteur cité dans les conflits d’usage électriques, notamment autour de l’électrification des quais.",
                "<strong>news.google.com :</strong> Agrégateur ayant relayé l'analyse nationale sur les tensions liées aux data centers."
            ]
        };

        let activeCategory = 'all';
        let activeStance = 'all';

        // Initialisation de la page
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('header-title').innerText = projectData.meta.title;
            document.getElementById('header-subtitle').innerText = projectData.meta.subtitle;

            renderFilters();
            renderGrid();
            renderGriefs();
            renderLists();
        });

        // Gestion du menu Onglets
        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Rendu dynamique de la barre latérale et calcul automatisé des effectifs
        function renderFilters() {
            const catContainer = document.getElementById('cat-filters-container');
            const stanceContainer = document.getElementById('stance-filters-container');
            
            catContainer.innerHTML = '';
            stanceContainer.innerHTML = '';

            // 1. Catégories
            Object.entries(projectData.taxonomy.categories).forEach(([key, label]) => {
                const count = key === 'all' ? projectData.actors.length : projectData.actors.filter(a => a.category === key).length;
                const activeClass = key === activeCategory ? 'active' : '';
                catContainer.innerHTML += `
                    <button class="filter-btn ${activeClass}" onclick="setCategoryFilter('${key}', this)">
                        <span>${label}</span> <span class="count">${count}</span>
                    </button>
                `;
            });

            // 2. Positionnements (Stances)
            Object.entries(projectData.taxonomy.stances).forEach(([key, label]) => {
                const activeClass = key === activeStance ? 'active' : '';
                stanceContainer.innerHTML += `
                    <button class="filter-btn ${activeClass}" onclick="setStanceFilter('${key}', this)">
                        <span>${label}</span>
                    </button>
                `;
            });
        }

        function setCategoryFilter(category, el) {
            document.querySelectorAll('#cat-filters-container .filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeCategory = category;
            renderGrid();
        }

        function setStanceFilter(stance, el) {
            document.querySelectorAll('#stance-filters-container .filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeStance = stance;
            renderGrid();
        }

        // Rendu dynamique des fiches acteurs filtrées
        function renderGrid() {
            const grid = document.getElementById('actors-grid');
            grid.innerHTML = '';

            const filteredActors = projectData.actors.filter(actor => {
                const matchCategory = (activeCategory === 'all' || actor.category === activeCategory);
                const matchStance = (activeStance === 'all' || actor.stance === activeStance);
                return matchCategory && matchStance;
            });

            if (filteredActors.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted); font-weight: 500;">Aucun acteur ne correspond à ce croisement de filtres.</div>`;
                return;
            }

            filteredActors.forEach(actor => {
                const card = document.createElement('div');
                card.className = `actor-card ${actor.stance}`;
                card.onclick = () => openActorModal(actor);

                card.innerHTML = `
                    <div class="actor-header">
                        <div class="actor-name">${actor.name}</div>
                        <div class="actor-role">${actor.role}</div>
                    </div>
                    <div class="actor-body">${actor.position}</div>
                    <div class="actor-footer">
                        <span class="badge ${actor.stance}">${projectData.taxonomy.stances[actor.stance]}</span>
                        <span class="certitude">Certitude : ${actor.certainty}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Rendu dynamique de l'onglet 2 (Griefs)
        function renderGriefs() {
            const container = document.getElementById('griefs-grid');
            container.innerHTML = '';

            projectData.griefs.forEach(g => {
                container.innerHTML += `
                    <div class="grief-card">
                        <h2>${g.title}</h2>
                        <p>${g.text}</p>
                    </div>
                `;
            });
        }

        // Rendu des listes analytiques et descriptives (Onglet 3)
        function renderLists() {
            const vigList = document.getElementById('vigilance-list');
            const srcList = document.getElementById('sources-list');

            vigList.innerHTML = '';
            srcList.innerHTML = '';

            projectData.vigilance.forEach(item => {
                vigList.innerHTML += `<li>${item}</li>`;
            });
            projectData.sources.forEach(item => {
                srcList.innerHTML += `<li>${item}</li>`;
            });
        }

        // Hydratation de la fenêtre modale de détail
        function openActorModal(actor) {
            document.getElementById('modal-name').innerText = actor.name;
            document.getElementById('modal-role').innerText = actor.role;
            document.getElementById('modal-position').innerText = actor.position;
            document.getElementById('modal-verbatim').innerText = actor.evidence || "Aucun verbatim direct extrait dans le corpus.";
            document.getElementById('modal-certainty').innerText = actor.certainty;

            const badge = document.getElementById('modal-stance-badge');
            badge.className = `badge ${actor.stance}`;
            badge.innerText = projectData.taxonomy.stances[actor.stance];

            toggleModal(true);
        }

        function toggleModal(show) {
            const modal = document.getElementById('actor-modal');
            modal.classList.toggle('active', show);
        }

        function closeModal(event) {
            if (event.target.id === 'actor-modal') {
                toggleModal(false);
            }
        }
    </script>
</body>
</html>
