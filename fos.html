<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographie interactive — Ligne THT Fos-Jonquières</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            --color-opposed: #ef4444;
            --color-opposed-light: #fee2e2;
            --color-favorable: #22c55e;
            --color-favorable-light: #dcfce7;
            --color-neutral: #f59e0b;
            --color-neutral-light: #fef3c7;
            
            --primary: #3b82f6;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Menu Onglets */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: var(--radius);
            transition: var(--transition);
        }

        .tab-btn:hover {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.2s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Interface Cartographie */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 968px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Filtres */
        .filters-sidebar {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            position: sticky;
            top: 2rem;
        }

        .filter-section {
            margin-bottom: 1.5rem;
        }

        .filter-section h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.6rem 0.8rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn .count {
            font-size: 0.75rem;
            background-color: rgba(0, 0, 0, 0.05);
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
        }

        .filter-btn.active .count {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Grille des Cartes Acteurs */
        .actors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .actor-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .actor-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .actor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
        }

        .actor-card.opposed::before { background-color: var(--color-opposed); }
        .actor-card.favorable::before { background-color: var(--color-favorable); }
        .actor-card.neutral::before { background-color: var(--color-neutral); }

        .actor-header {
            margin-bottom: 1rem;
        }

        .actor-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .actor-role {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .actor-body {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .actor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            font-size: 0.8rem;
        }

        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.025em;
        }

        .badge.opposed { background-color: var(--color-opposed-light); color: var(--color-opposed); }
        .badge.favorable { background-color: var(--color-favorable-light); color: var(--color-favorable); }
        .badge.neutral { background-color: var(--color-neutral-light); color: var(--color-neutral); }

        .certitude {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Modal Détails Acteur */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            position: relative;
            animation: modalAnim 0.2s ease-out;
        }

        @keyframes modalAnim {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-field {
            margin-bottom: 1.25rem;
        }

        .modal-field label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .modal-field p {
            font-size: 1rem;
            color: var(--text-main);
        }

        .modal-verbatim {
            background-color: var(--bg-primary);
            padding: 1rem;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            font-style: italic;
        }

        /* Styles Onglet Griefs */
        .griefs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 2rem;
        }

        @media (max-width: 640px) {
            .griefs-container { grid-template-columns: 1fr; }
        }

        .grief-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .grief-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Listes & Sources */
        .list-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .list-card h2 {
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .list-card ul {
            padding-left: 1.5rem;
        }

        .list-card li {
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Chargement...</h1>
        <p id="header-subtitle"></p>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('carto', this)">Cartographie des acteurs</button>
        <button class="tab-btn" onclick="switchTab('griefs', this)">Synthèse des oppositions</button>
        <button class="tab-btn" onclick="switchTab('vigilance', this)">Points de vigilance &amp; sources</button>
    </nav>

    <div id="tab-carto" class="tab-content active">
        <div class="dashboard-layout">
            <aside class="filters-sidebar">
                <div class="filter-section">
                    <h3>Collèges d'acteurs</h3>
                    <div class="filter-options" id="cat-filters-container"></div>
                </div>

                <div class="filter-section">
                    <h3>Positionnement</h3>
                    <div class="filter-options" id="stance-filters-container"></div>
                </div>
            </aside>

            <main class="actors-grid" id="actors-grid"></main>
        </div>
    </div>

    <div id="tab-griefs" class="tab-content">
        <div class="griefs-container" id="griefs-grid"></div>
    </div>

    <div id="tab-vigilance" class="tab-content">
        <div class="list-card">
            <h2>🔍 Points de vigilance majeurs (Limites et incertitudes)</h2>
            <ul id="vigilance-list"></ul>
        </div>

        <div class="list-card">
            <h2>📰 Médias et sources d'investigation répertoriés</h2>
            <ul id="sources-list"></ul>
        </div>
    </div>

    <div class="modal" id="actor-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="toggleModal(false)">×</button>
            <div class="modal-field">
                <label>Nom / Entité</label>
                <h2 id="modal-name" style="font-size:1.6rem; font-weight:700;"></h2>
            </div>
            <div class="modal-field">
                <label>Fonction / Rattachement</label>
                <p id="modal-role"></p>
            </div>
            <div class="modal-field">
                <label>Positionnement ou Argument Principal</label>
                <p id="modal-position"></p>
            </div>
            <div class="modal-field">
                <label>Verbatim / Preuve documentaire</label>
                <p id="modal-verbatim" class="modal-verbatim"></p>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <div class="modal-field" style="margin:0;">
                    <label>Orientation</label>
                    <span id="modal-stance-badge" class="badge"></span>
                </div>
                <div class="modal-field" style="margin:0; text-align: right;">
                    <label>Niveau de certitude</label>
                    <p id="modal-certainty" class="certitude"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Restitution stricte de l'objet projectData pour Fos-Jonquières
        const projectData = {
            meta: {
                title: "Cartographie interactive — Ligne THT Fos-Jonquières",
                subtitle: "Projet de ligne aérienne 400 kV porté par RTE entre Jonquières-Saint-Vincent et Fos-sur-Mer. Le dossier cristallise un conflit majeur entre l'urgence de décarbonation industrielle de Fos et la préservation d'écosystèmes et de terres agricoles uniques (Camargue, Crau, Terre d'Argence)."
            },
            taxonomy: {

                },

            },
            actors: [
                { name: "RTE", category: "porteurs", stance: "favorable", role: "Porteur technique du projet", position: "Défend la solution aérienne pour ses délais, coûts et capacité de puissance électrique.", evidence: "Maître d'ouvrage et défenseur exclusif du tracé aérien.", certainty: "Haute" },
                { name: "Patrick de Carolis", category: "elus-opp", stance: "opposed", role: "Maire d'Arles", position: "Opposé au tracé aérien ; demande un réexamen des besoins et l'étude sérieuse des alternatives.", evidence: "Déclarations publiques d'opposition au fuseau impactant sa commune.", certainty: "Haute" },
                { name: "Collectif THT 13/30", category: "orgs", stance: "opposed", role: "Coalition interdépartementale", position: "Coalition centrale opposée au projet aérien, prône l'enfouissement systématique ou l'ensouillement.", evidence: "Organisation structurante de la fronde citoyenne et associative.", certainty: "Haute" },
                { name: "Renaud Muselier", category: "elus-fav", stance: "neutral", role: "Président de la Région Sud", position: "Appelle à une solution partagée et évoque l'option des mini-réacteurs SMR pour l'autonomie.", evidence: "Prise de position modérée cherchant un compromis technologique.", certainty: "Moyenne" },
                { name: "Jean-Luc Moya", category: "opposants", stance: "opposed", role: "Porte-parole du collectif THT 13/30", position: "Très investi contre l'aérien et défenseur de la biodiversité locale.", evidence: "Prises de parole publiques au nom de l'ensemble du collectif.", certainty: "Haute" },
                { name: "Cédric Bernardi", category: "opposants", stance: "opposed", role: "Riziculteur (ASTCC)", position: "S'oppose à l'emprise sur ses terres et à la dégradation du paysage agricole.", evidence: "Mobilisation syndicale et foncière directe.", certainty: "Haute" },
                { name: "Séverine Dellanegra", category: "elus-opp", stance: "opposed", role: "Maire de Saint-Martin-de-Crau", position: "Opposée à la DUP, souligne l'impact désastreux sur la biodiversité de la Crau.", evidence: "Rejet institutionnel formel du projet par la mairie.", certainty: "Haute" },
                { name: "Emmanuel Taché", category: "elus-opp", stance: "opposed", role: "Député RN", position: "S'oppose au projet et alerte sur le risque de création d'une ZAD.", evidence: "Intervention législative et relais d'alertes sécuritaires.", certainty: "Haute" },
                { name: "France Chimie Méditerranée", category: "porteurs", stance: "favorable", role: "Syndicat professionnel", position: "Soutient la ligne pour sécuriser la décarbonation industrielle de Fos-sur-Mer.", evidence: "Défense des intérêts électriques de la ZIP de Fos.", certainty: "Haute" },
                { name: "Jean-Laurent Lucchesi", category: "opposants", stance: "opposed", role: "Biologiste (Vigueirat Nature, FNE13)", position: "Figure centrale côté biodiversité : avifaune, Camargue, couloirs migratoires, alternative sous-marine.", evidence: "Apport d'expertise technique et environnementale au collectif.", certainty: "Haute" },
                { name: "Guillaume Meiffre", category: "opposants", stance: "opposed", role: "Oléiculteur / Coprésident ASTCC", position: "Évoque une résistance plus dure et une possible ZAD si le projet avance en force.", evidence: "Menace de durcissement des actions sur le terrain.", certainty: "Haute" },
                { name: "Carole Guintoli", category: "opposants", stance: "opposed", role: "Rizicultrice bio en Camargue", position: "Associée aux prises de position contre le projet aérien au nom des terres agricoles.", evidence: "Membre active de l'association de sauvegarde des terres.", certainty: "Haute" },
                { name: "Cyril Marès", category: "opposants", stance: "opposed", role: "Président de la COPA 30 et AOC Costières de Nîmes", position: "Porte une opposition agricole et viticole ; appelle à une union agriculteurs/écologistes/élus.", evidence: "Stratégie de convergence des luttes locales.", certainty: "Haute" },
                { name: "Sébastien Mabile", category: "opposants", stance: "opposed", role: "Avocat en droit de l'environnement", position: "Structure la bataille juridique et les futurs recours administratifs contre le projet aérien.", evidence: "Cofondateur de la stratégie juridique du collectif THT 13/30.", certainty: "Haute" },

                { name: "Marie-Hélène Fabre", category: "opposants", stance: "opposed", role: "Responsable ACEN", position: "Critique le contournement autoroutier d'Arles et envisage une action juridique sur la concertation.", evidence: "Rapprochement des luttes d'infrastructures locales.", certainty: "Moyenne" },
                { name: "Cyril Girard", category: "opposants", stance: "opposed", role: "Élu municipal d'opposition (Arles)", position: "Critique les grands projets d'infrastructures, notamment le contournement d'Arles et la THT.", evidence: "Opposition politique aux projets d'aménagement massifs.", certainty: "Haute" },

                { name: "Stéphane Coppey", category: "opposants", stance: "opposed", role: "Délégué juridique FNE13", position: "Acteur des actions contentieuses et environnementales contre RTE.", evidence: "Expertise contentieuse contre les documents d'urbanisme.", certainty: "Haute" },
                { name: "Isabelle Charnoz", category: "elus-opp", stance: "opposed", role: "Adjointe à Saint-Martin-de-Crau", position: "Engagée dans la protection de l'environnement et associée à la mobilisation anti-THT.", evidence: "Soutien municipal actif à l'opposition.", certainty: "Haute" },

                { name: "Carole Delga", category: "elus-opp", stance: "opposed", role: "Présidente de la Région Occitanie", position: "Soutien régional contre le projet aérien tel que validé par l'État.", evidence: "Opposition de la région voisine impactée.", certainty: "Haute" },
                { name: "Nicolas Koukas", category: "elus-opp", stance: "neutral", role: "Élu d'opposition PCF (Arles)", position: "Favorable à l'enfouissement technique, mais critique surtout la gouvernance municipale actuelle.", evidence: "Critique politique de l'exécutif arlésien.", certainty: "Moyenne" },
                { name: "René Raimondi", category: "elus-fav", stance: "favorable", role: "Maire de Fos-sur-Mer", position: "Favorable à la réindustrialisation de Fos ; critique le débat jugé à charge par les opposants.", evidence: "Défenseur des intérêts de la ZIP et de l'industrie.", certainty: "Haute" },
                { name: "Georges-François Leclerc", category: "elus-fav", stance: "favorable", role: "Préfet de région PACA", position: "Cadre le débat public et la décision ; perçu par certains opposants comme pro-aérien.", evidence: "Représentation de l'autorité décisionnelle étatique.", certainty: "Haute" },
                { name: "Christophe Mirmand", category: "elus-fav", stance: "neutral", role: "Ancien préfet de région", position: "À l'origine de la saisine de la CNDP et de l'organisation du débat global Fos-Berre.", evidence: "Auteur de l'architecture initiale du débat public.", certainty: "Haute" },
                { name: "Jérôme Bonet", category: "elus-fav", stance: "neutral", role: "Préfet du Gard", position: "Acteur décisionnaire sur le volet gardois du tracé (Jonquières / Bellegarde).", evidence: "Autorité de tutelle départementale associée.", certainty: "Haute" },
                { name: "Jacques Witkowski", category: "elus-fav", stance: "neutral", role: "Nouveau préfet de région PACA", position: "Hérite du dossier administratif et des arbitrages sur la DUP.", evidence: "Garant de la continuité de l'État sur le dossier.", certainty: "Haute" },
                { name: "Gilles Odone", category: "porteurs", stance: "favorable", role: "Directeur délégué RTE Méditerranée", position: "Défend l'urgence des besoins électriques et l'impossibilité de tenir les délais avec un enfouissement.", evidence: "Porte-parole principal de RTE sur les contraintes calendaires.", certainty: "Haute" },
                { name: "Vincent Fletin & Arthur Audouard", category: "porteurs", stance: "favorable", role: "Experts nationaux RTE", position: "Portent l'argumentaire technique de RTE en réunion publique sur le 400 kV.", evidence: "Expertise technique déployée face aux collectifs.", certainty: "Haute" },
                { name: "Emmanuel Macron", category: "elus-fav", stance: "favorable", role: "Président de la République", position: "Soutient la ligne, jugée nécessaire pour donner de la visibilité aux industriels.", evidence: "Cadrage politique national en faveur de l'accélération.", certainty: "Haute" },
                { name: "État / gouvernement", category: "elus-fav", stance: "favorable", role: "Appareil d'État", position: "Engage l'instruction de la DUP et cadre les arbitrages de réindustrialisation.", evidence: "Garant de l'objectif souverain de décarbonation.", certainty: "Haute" },
                { name: "Provence Fabrique des Possibles", category: "porteurs", stance: "favorable", role: "Collectif industriel", position: "Soutient la ligne comme condition sine qua non des investissements sur Fos-Berre.", evidence: "Lobbying industriel régional pro-infrastructure.", certainty: "Haute" },
                { name: "Jean-Luc Chauvin", category: "porteurs", stance: "favorable", role: "Président de la CCI Aix-Marseille", position: "Défend la ligne au nom de la souveraineté et de la sécurité d'approvisionnement.", evidence: "Représentation du monde patronal régional.", certainty: "Haute" },
                { name: "Grand Port Maritime de Marseille-Fos", category: "porteurs", stance: "favorable", role: "Maître d'ouvrage portuaire", position: "Acteur central de la ZIP, aménageur foncier nécessitant une forte puissance électrique.", evidence: "Bénéficiaire final essentiel de l'alimentation électrique.", certainty: "Haute" },
                { name: "Rémi Costantino", category: "porteurs", stance: "favorable", role: "DGA du GPMM", position: "Défend le desserrement foncier et la recherche de fonciers disponibles pour l'industrie.", evidence: "Prises de parole sur la gestion des espaces industriels.", certainty: "Haute" },
                { name: "Régis Passerieux", category: "elus-fav", stance: "neutral", role: "Commissaire à la transition", position: "Coordonne la transition industrielle, écologique et énergétique de Fos-Berre.", evidence: "Acteur de liaison entre l'État et le territoire.", certainty: "Haute" },
                { name: "NGE / Jean Bernadet", category: "porteurs", stance: "favorable", role: "Groupe de BTP / Président", position: "Soutient fortement la ligne et estime paradoxalement que l'enfouissement causerait davantage de dégâts.", evidence: "Avis technique d'un acteur majeur des travaux publics.", certainty: "Haute" },
                { name: "Marc Petit", category: "opposants", stance: "neutral", role: "Professeur CentraleSupélec", position: "Auteur de la tierce expertise. Valide l'alternative enfouie du collectif tout en reconnaissant les avantages techniques RTE.", evidence: "Rapport d'expertise indépendante versé au débat.", certainty: "Haute" },
                { name: "FNE13", category: "orgs", stance: "opposed", role: "Fédération environnementale", position: "Pilier du Collectif THT 13/30, apporte le relais juridique et d'expertise environnementale.", evidence: "Porteur d'actions contentieuses et de contre-études.", certainty: "Haute" },
                { name: "Sauvegarde terres Camargue-Crau", category: "orgs", stance: "opposed", role: "Association agricole", position: "Fondée par les exploitants impactés, mot d'ordre strict : zéro pylône.", evidence: "Fronde foncière de la profession agricole locale.", certainty: "Haute" },
                { name: "ASTA", category: "orgs", stance: "opposed", role: "Association gardoise", position: "Structure l'opposition côté Gard (Beaucaire / Bellegarde) et Terre d'Argence.", evidence: "Mobilisation citoyenne du côté Occitanie.", certainty: "Haute" },
                { name: "Acteurs de la Biodiversité (LPO, Tour du Valat, CEN PACA, WWF)", category: "orgs", stance: "opposed", role: "Réseau scientifique et ONG", position: "Alertent massivement sur les oiseaux migrateurs (Aigle de Bonelli, Ganga cata) et l'impact sur les zones humides.", evidence: "Production d'inventaires naturalistes critiques.", certainty: "Haute" },
                { name: "Syndicats Agricoles (COPA 13, COPA 30, FDSEA, CR)", category: "orgs", stance: "opposed", role: "Organisations professionnelles", position: "S'opposent unanimement au tracé aérien détruisant les paysages (AOC Costières) et les filières (Foin de Crau, Riz).", evidence: "Communiqués inter-syndicaux et blocages annoncés.", certainty: "Haute" },
                { name: "Industriels de Fos (GravitHy, Carbon, H2V, ArcelorMittal)", category: "porteurs", stance: "favorable", role: "Bénéficiaires industriels", position: "Justifient la ligne THT par leurs immenses besoins électriques liés aux process de décarbonation et d'hydrogène.", evidence: "Plans d'investissements conditionnés à l'énergie.", certainty: "Haute" },
                { name: "Context d'évaluation (CNDP)", category: "orgs", stance: "neutral", role: "Instances de concertation", position: "Organisent le débat global Fos-Berre, rappelant que l'exercice est consultatif et non référendaire.", evidence: "Cadrage de la méthodologie de participation du public.", certainty: "Haute" }
            ],
            griefs: [], // Hydratés de façon brute ci-dessous pour préserver l'intégrité visuelle
            vigilance: [
                "<strong>Menace de radicalisation (ZAD) :</strong> Plusieurs acteurs agricoles (G. Meiffre) et élus (E. Taché) alertent publiquement sur le risque de création d'une ZAD si le passage en force de l'État se confirme, illustrant l'impasse du dialogue local.",
                "<strong>Front institutionnel inédit :</strong> Le dossier réunit une alliance rare entre monde agricole (syndicats de tous bords), écologistes (FNE, LPO) et élus locaux (Arles, St-Martin, Gard, Région Occitanie) contre RTE et l'État.",
                "<strong>Le paradoxe de la décarbonation :</strong> La THT mettre en lumière la contradiction entre la volonté nationale de décarboner l'industrie lourde (Fos) et les destructions écologiques directes (Camargue/Crau) que nécessitent ces nouvelles infrastructures électriques.",
                "<strong>Recours juridiques européens :</strong> La stratégie des opposants (Me Mabile, FNE13) vise ouvertement une saisine des instances internationales (Conventions de Berne et Ramsar) s'appuyant sur les propres notes d'alerte de la DREAL."
            ],
            sources: [
                "<strong>La Provence :</strong> Source locale majeure sur Arles, Camargue, élus, associations et projets industriels.",
                "<strong>Objectif Gard :</strong> Source très présente sur Terre d'Argence, Beaucaire, et la contestation gardoise.",
                "<strong>La Marseillaise :</strong> Source axée sur la réindustrialisation, les débats sociaux de Fos-Berre et les critiques locales.",
                "<strong>France 3 / Franceinfo :</strong> Relais national-régional sur la biodiversité, la mobilisation agricole et les oppositions.",
                "<strong>FNE13.fr :</strong> Source militante détaillant la tierce expertise, les recours juridiques et l'argumentaire biodiversité.",
                "<strong>Marsactu :</strong> Média d'investigation critique sur RTE, les espèces protégées et les controverses de gouvernance.",
                "<strong>Tourduvalat.org :</strong> Référence scientifique centrale sur la préservation des zones humides, tourbières et oiseaux de Camargue."
            ]
        };

        let activeCategory = 'all';
        let activeStance = 'all';

        // Lancement au chargement du DOM
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('header-title').innerText = projectData.meta.title;
            document.getElementById('header-subtitle').innerText = projectData.meta.subtitle;

            renderFilters();
            renderGrid();
            renderGriefsHTML();
            renderLists();
        });

        // Commutation saine des onglets principaux (this transmis nativement)
        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Rendu dynamique de la barre latérale et calcul automatisé des effectifs
        function renderFilters() {
            const catContainer = document.getElementById('cat-filters-container');
            const stanceContainer = document.getElementById('stance-filters-container');
            
            catContainer.innerHTML = '';
            stanceContainer.innerHTML = '';

            // 1. Génération Filtres Catégories
            Object.entries(projectData.taxonomy.categories).forEach(([key, label]) => {
                const count = key === 'all' ? projectData.actors.length : projectData.actors.filter(a => a.category === key).length;
                const activeClass = key === activeCategory ? 'active' : '';
                catContainer.innerHTML += `
                    <button class="filter-btn ${activeClass}" onclick="setCategoryFilter('${key}', this)">
                        <span>${label}</span> <span class="count">${count}</span>
                    </button>
                `;
            });

            // 2. Génération Filtres Positionnements
            Object.entries(projectData.taxonomy.stances).forEach(([key, label]) => {
                const activeClass = key === activeStance ? 'active' : '';
                stanceContainer.innerHTML += `
                    <button class="filter-btn ${activeClass}" onclick="setStanceFilter('${key}', this)">
                        <span>${label}</span>
                    </button>
                `;
            });
        }

        function setCategoryFilter(category, el) {
            document.querySelectorAll('#cat-filters-container .filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeCategory = category;
            renderGrid();
        }

        function setStanceFilter(stance, el) {
            document.querySelectorAll('#stance-filters-container .filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeStance = stance;
            renderGrid();
        }

        // Rendu de la grille filtrée des fiches acteurs
        function renderGrid() {
            const grid = document.getElementById('actors-grid');
            grid.innerHTML = '';

            const filteredActors = projectData.actors.filter(actor => {
                const matchCategory = (activeCategory === 'all' || actor.category === activeCategory);
                const matchStance = (activeStance === 'all' || actor.stance === activeStance);
                return matchCategory && matchStance;
            });

            if (filteredActors.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted); font-weight: 500;">Aucun acteur ne correspond à ce croisement de filtres.</div>`;
                return;
            }

            filteredActors.forEach(actor => {
                const card = document.createElement('div');
                card.className = `actor-card ${actor.stance}`;
                card.onclick = () => openActorModal(actor);

                card.innerHTML = `
                    <div class="actor-header">
                        <div class="actor-name">${actor.name}</div>
                        <div class="actor-role">${actor.role}</div>
                    </div>
                    <div class="actor-body">${actor.position}</div>
                    <div class="actor-footer">
                        <span class="badge ${actor.stance}">${projectData.taxonomy.stances[actor.stance]}</span>
                        <span class="certitude">Certitude : ${actor.certainty}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Hydratation sémantique de l'onglet 2 (Griefs)
        function renderGriefsHTML() {
            const container = document.getElementById('griefs-grid');
            container.innerHTML = '';
            
            const explicitGriefs = [
                { title: "🦅 Impact sur la biodiversité", text: "Crainte documentée (Tour du Valat, LPO, CEN) de destruction d'habitats et de couloirs migratoires vitaux pour l'avifaune (Aigle de Bonelli, Ganga cata) sur les espaces protégés uniques de Camargue et de Crau." },
                { title: "🌾 Sacrifice des terres agricoles", text: "Fronde unanime des syndicats (COPA, FDSEA) et AOC face à la perte foncière, paysagère et économique induite par les pylônes géants (Foin de Crau, Riz de Camargue, Vignes des Costières)." },
                { title: "⚡ Refus de l'enfouissement technique", text: "Le collectif dénonce la posture de RTE qui rejette l'option enfouie/sous-marine sous prétexte de surcoûts et de délais (argument battu en brèche par la tierce expertise indépendante de M. Petit)." },
                { title: "⚖️ Passage en force réglementaire", text: "Les élus et riverains dénoncent une DUP expéditive pilotée par l'État, ignorant l'opposition territoriale unanime sous couvert d'urgence industrielle et de souveraineté nationale." },
                { title: "🏭 Effets cumulés sur Fos-Berre", text: "Inquiétude face à la méthode de concertation globale noyant le projet THT au milieu d'autres méga-projets (GravitHy, Carbon, H2V), brouillant l'évaluation environnementale globale." }
            ];

            explicitGriefs.forEach(g => {
                container.innerHTML += `
                    <div class="grief-card">
                        <h2>${g.title}</h2>
                        <p>${g.text}</p>
                    </div>
                `;
            });
        }

        // Hydratation de l'onglet 3 (Listes)
        function renderLists() {
            const vigList = document.getElementById('vigilance-list');
            const srcList = document.getElementById('sources-list');

            vigList.innerHTML = '';
            srcList.innerHTML = '';

            projectData.vigilance.forEach(item => vigList.innerHTML += `<li>${item}</li>`);
            projectData.sources.forEach(item => srcList.innerHTML += `<li>${item}</li>`);
        }

        // Hydratation et affichage de la fenêtre modale
        function openActorModal(actor) {
            document.getElementById('modal-name').innerText = actor.name;
            document.getElementById('modal-role').innerText = actor.role;
            document.getElementById('modal-position').innerText = actor.position;
            document.getElementById('modal-verbatim').innerText = actor.evidence || "Aucun verbatim direct extrait dans le corpus.";
            document.getElementById('modal-certainty').innerText = actor.certainty;

            const badge = document.getElementById('modal-stance-badge');
            badge.className = `badge ${actor.stance}`;
            badge.innerText = projectData.taxonomy.stances[actor.stance];

            toggleModal(true);
        }

        function toggleModal(show) {
            const modal = document.getElementById('actor-modal');
            modal.classList.toggle('active', show);
        }

        function closeModal(event) {
            if (event.target.id === 'actor-modal') {
                toggleModal(false);
            }
        }
    </script>
</body>
</html>
